<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32">
<link rel="apple-touch-icon" href="favicon-180.png">
<title>助教每日引导 · 筑真学塾</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: "SF Pro Display", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
  background: #FAFAF8;
  color: #1a1a1a;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Brand Colors ── */
:root {
  --purple: #660874;
  --bright-purple: #C88FD4;
  --yellow: #F2CC84;
  --light-purple: #F0E4F3;
  --dark-purple: #2E0738;
  --card-bg: #ffffff;
  --done-bg: #f9f7fb;
  --done-text: #a89bb5;
  --radius: 10px;
  --shadow: 0 2px 8px rgba(102,8,116,0.08);
}

/* ── Layout ── */
.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 16px 80px;
}

/* ── Back link ── */
.back {
  position: absolute;
  left: 1rem;
  top: 1rem;
  color: rgba(255,255,255,0.8);
  text-decoration: none;
  font-size: 0.85rem;
}
.back:hover { color: #fff; }

/* ── Header ── */
.header {
  position: relative;
  background: linear-gradient(135deg, #1a1a1a 0%, #660874 100%);
  color: #fff;
  padding: 24px 16px 20px;
  text-align: center;
}
.header h1 {
  font-size: 24px;
  font-weight: 300;
  letter-spacing: 4px;
  margin-bottom: 4px;
}
.header .date {
  font-size: 14px;
  color: #C88FD4;
  letter-spacing: 1px;
  margin-bottom: 14px;
}

/* ── Course Switcher ── */
.course-switcher {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 14px;
}
.course-btn {
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.7);
  padding: 6px 20px;
  border-radius: 20px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.course-btn:hover { background: rgba(255,255,255,0.2); }
.course-btn.active {
  background: rgba(255,255,255,0.95);
  color: var(--purple);
  border-color: rgba(255,255,255,0.95);
}

.progress-wrap {
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  height: 10px;
  overflow: hidden;
  margin-bottom: 12px;
}
.progress-bar {
  height: 100%;
  background: var(--yellow);
  border-radius: 20px;
  transition: width 0.4s ease;
  width: 0%;
}
.progress-text {
  font-size: 0.8rem;
  opacity: 0.9;
  margin-bottom: 10px;
}
.header-actions {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}
.header-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 0.8rem;
  cursor: pointer;
  transition: background 0.2s;
}
.header-btn:hover { background: rgba(255,255,255,0.25); }
.header-btn.reset { border-color: rgba(255,200,200,0.5); }

/* ── Tabs ── */
.tabs {
  display: flex;
  background: var(--card-bg);
  border-bottom: 2px solid #eee;
  position: sticky;
  top: 0;
  z-index: 100;
  max-width: 752px;
  margin: 0 auto;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.tab {
  flex: 1;
  padding: 12px 8px;
  text-align: center;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  color: #888;
  user-select: none;
}
.tab:hover { color: var(--purple); }
.tab.active {
  color: var(--purple);
  border-bottom-color: var(--purple);
}
.tab .count {
  font-size: 0.75rem;
  font-weight: 400;
  opacity: 0.7;
}

/* ── Handover Notice ── */
.handover-notice {
  background: var(--card-bg);
  color: #1a1a1a;
  padding: 14px 18px;
  border-radius: var(--radius);
  margin-bottom: 14px;
  font-size: 0.88rem;
  line-height: 1.7;
  border-left: 4px solid var(--yellow);
  box-shadow: var(--shadow);
}

/* ── Steps ── */
.phase { display: none; padding-top: 12px; }
.phase.active { display: block; }

.step-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  border-left: 4px solid var(--purple);
  overflow: hidden;
  transition: opacity 0.3s, border-color 0.3s;
}
.step-card.done {
  border-left-color: #ccc;
  opacity: 0.55;
}
.step-card.done .step-title { text-decoration: line-through; color: var(--done-text); }

.step-header {
  display: flex;
  align-items: flex-start;
  padding: 14px 16px;
  cursor: pointer;
  gap: 12px;
  user-select: none;
}
.step-checkbox {
  flex-shrink: 0;
  width: 24px;
  height: 24px;
  border: 2px solid var(--purple);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
  transition: all 0.2s;
  cursor: pointer;
}
.step-card.done .step-checkbox {
  background: var(--purple);
  border-color: var(--purple);
}
.step-checkbox svg {
  width: 14px; height: 14px;
  stroke: #fff;
  stroke-width: 3;
  fill: none;
  opacity: 0;
  transition: opacity 0.2s;
}
.step-card.done .step-checkbox svg { opacity: 1; }

.step-info { flex: 1; min-width: 0; }
.step-num {
  font-size: 0.7rem;
  color: var(--purple);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.step-title {
  font-size: 1rem;
  font-weight: 600;
  margin: 2px 0 4px;
  transition: color 0.3s;
}
.step-summary {
  font-size: 0.85rem;
  color: #666;
  line-height: 1.5;
}
.step-badges {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.badge {
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
}
.badge-time {
  background: var(--yellow);
  color: var(--dark-purple);
}
.badge-coord {
  background: #FFE0E0;
  color: #8B3B3B;
}

.step-toggle {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.8rem;
  color: var(--purple);
  cursor: pointer;
  padding: 0 16px 12px;
  font-weight: 500;
  user-select: none;
}
.step-toggle .arrow {
  display: inline-block;
  transition: transform 0.2s;
  font-size: 0.7rem;
}
.step-toggle.open .arrow { transform: rotate(90deg); }

.step-details {
  display: none;
  background: var(--light-purple);
  padding: 14px 16px;
  font-size: 0.85rem;
  line-height: 1.7;
  border-top: 1px solid #e5e5e0;
}
.step-details.open { display: block; }
.step-details ol, .step-details ul {
  padding-left: 1.2em;
  margin: 6px 0;
}
.step-details li { margin-bottom: 4px; }
.step-details .tip {
  background: rgba(102,8,116,0.08);
  border-left: 3px solid var(--purple);
  padding: 8px 12px;
  margin-top: 8px;
  border-radius: 0 6px 6px 0;
  font-size: 0.82rem;
}
.step-details .tip::before { content: '💡 '; }
.step-details code {
  background: rgba(102,8,116,0.1);
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 0.82rem;
}
.step-details .example-block {
  background: rgba(255,255,255,0.7);
  border: 1px solid #e5e5e0;
  border-radius: 6px;
  padding: 10px 12px;
  margin: 8px 0;
  font-size: 0.82rem;
  white-space: pre-wrap;
  line-height: 1.6;
}
.step-details table {
  width: 100%;
  border-collapse: collapse;
  margin: 8px 0;
  font-size: 0.82rem;
}
.step-details th, .step-details td {
  border: 1px solid #e5e5e0;
  padding: 6px 10px;
  text-align: left;
}
.step-details th {
  background: rgba(102,8,116,0.08);
  font-weight: 600;
}

/* ── Modal ── */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(46,7,56,0.5);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff;
  border-radius: var(--radius);
  max-width: 600px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(46,7,56,0.25);
}
.modal-header {
  background: var(--purple);
  color: #fff;
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  border-radius: var(--radius) var(--radius) 0 0;
}
.modal-header h2 { font-size: 1.05rem; }
.modal-close {
  background: none;
  border: none;
  color: #fff;
  font-size: 1.5rem;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
}
.modal-body { padding: 20px; }
.modal-body h3 {
  font-size: 0.95rem;
  color: var(--purple);
  margin: 16px 0 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid #eee;
}
.modal-body h3:first-child { margin-top: 0; }

.emergency-item {
  margin-bottom: 14px;
  padding: 12px;
  background: #fafafa;
  border-radius: 8px;
  border-left: 3px solid var(--yellow);
}
.emergency-item .situation {
  font-weight: 600;
  font-size: 0.9rem;
  margin-bottom: 4px;
  color: var(--dark-purple);
}
.emergency-item .solution {
  font-size: 0.85rem;
  color: #555;
  line-height: 1.6;
}

.color-swatch {
  display: inline-block;
  width: 20px;
  height: 20px;
  border-radius: 4px;
  vertical-align: middle;
  margin-right: 6px;
  border: 1px solid rgba(0,0,0,0.1);
}

.file-naming-table { width: 100%; }
.file-naming-table th, .file-naming-table td {
  border: 1px solid #e5e5e0;
  padding: 8px 10px;
  font-size: 0.85rem;
}
.file-naming-table th {
  background: var(--light-purple);
  font-weight: 600;
}

/* ── Footer ── */
.footer {
  text-align: center;
  padding: 24px 16px;
  font-size: 0.8rem;
  color: #aaa;
}
.footer .brand {
  color: var(--purple);
  font-weight: 700;
  font-size: 0.9rem;
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .header { padding: 18px 12px 16px; }
  .header h1 { font-size: 20px; letter-spacing: 3px; }
  .tab { font-size: 0.82rem; padding: 10px 4px; }
  .step-header { padding: 12px; gap: 10px; }
  .step-title { font-size: 0.95rem; }
  .step-details { padding: 12px; }
  .container { padding: 0 8px 60px; }
}

/* ── Animations ── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.phase.active .step-card {
  animation: fadeIn 0.3s ease forwards;
}
.phase.active .step-card:nth-child(2) { animation-delay: 0.03s; }
.phase.active .step-card:nth-child(3) { animation-delay: 0.06s; }
.phase.active .step-card:nth-child(4) { animation-delay: 0.09s; }
.phase.active .step-card:nth-child(5) { animation-delay: 0.12s; }
.phase.active .step-card:nth-child(6) { animation-delay: 0.15s; }
.phase.active .step-card:nth-child(7) { animation-delay: 0.18s; }
.phase.active .step-card:nth-child(8) { animation-delay: 0.21s; }
.phase.active .step-card:nth-child(9) { animation-delay: 0.24s; }
.phase.active .step-card:nth-child(10) { animation-delay: 0.27s; }
.phase.active .step-card:nth-child(11) { animation-delay: 0.30s; }

/* ── Confirm Dialog ── */
.confirm-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(46,7,56,0.5);
  z-index: 300;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.confirm-overlay.open { display: flex; }
.confirm-box {
  background: #fff;
  border-radius: var(--radius);
  padding: 24px;
  max-width: 360px;
  width: 100%;
  text-align: center;
  box-shadow: 0 8px 32px rgba(46,7,56,0.25);
}
.confirm-box p {
  font-size: 0.95rem;
  margin-bottom: 20px;
  line-height: 1.5;
}
.confirm-btns {
  display: flex;
  gap: 12px;
  justify-content: center;
}
.confirm-btns button {
  padding: 8px 24px;
  border-radius: 20px;
  font-size: 0.85rem;
  cursor: pointer;
  font-weight: 600;
  border: none;
}
.btn-cancel {
  background: #eee;
  color: #666;
}
.btn-confirm {
  background: var(--purple);
  color: #fff;
}
</style>
</head>

<!-- Header -->
<div class="header" id="header">
  <a class="back" href="index.html">← 工具箱</a>
  <h1 id="pageTitle">助教 · 每日引导</h1>
  <div class="date" id="dateDisplay"></div>
  <div class="course-switcher" id="courseSwitcher"></div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="progress-text" id="progressText">0 / 0 步已完成</div>
  <div class="header-actions">
    <button class="header-btn" onclick="openModal('emergency')">🚨 异常处理</button>
    <button class="header-btn" onclick="openModal('quickref')">📌 速查</button>
<button class="header-btn reset" onclick="confirmReset()">↩ 重置今日</button>
  </div>
</div>

<!-- Tabs -->
<div class="tabs" id="tabs"></div>

<!-- Content -->
<div class="container" id="content"></div>

<!-- Footer -->
<div class="footer">
  <div class="brand">筑真学塾</div>
  <div style="margin-top:4px">v2.0 · 2026-03-11 更新</div>
  <div style="margin-top:4px;font-size:0.75rem;color:#bbb">负责人：<span id="coordFooter"></span></div>
</div>

<!-- Emergency Modal -->
<div class="modal-overlay" id="modal-emergency" onclick="closeModalOverlay(event,'emergency')">
  <div class="modal">
    <div class="modal-header">
      <h2>🚨 异常处理速查</h2>
      <button class="modal-close" onclick="closeModal('emergency')">&times;</button>
    </div>
    <div class="modal-body" id="emergencyBody"></div>
  </div>
</div>

<!-- Quick Reference Modal -->
<div class="modal-overlay" id="modal-quickref" onclick="closeModalOverlay(event,'quickref')">
  <div class="modal">
    <div class="modal-header">
      <h2>📌 速查手册</h2>
      <button class="modal-close" onclick="closeModal('quickref')">&times;</button>
    </div>
    <div class="modal-body" id="quickrefBody"></div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p>确定要清除今天的所有进度吗？</p>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">取消</button>
      <button class="btn-confirm" onclick="doReset()">确认重置</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════
   负责人配置 — 所有「{manager}」会被替换为此名称
   ══════════════════════════════════════════════════════════════ */
const COORD_KEY = 'zhuzhen-manager';
// URL 参数 ?coord=名字 可更新负责人，设置后自动清除参数
(function() {
  const p = new URLSearchParams(location.search).get('coord');
  if (p && p.trim()) {
    localStorage.setItem(COORD_KEY, p.trim());
    history.replaceState(null, '', location.pathname);
  }
})();
function getCoordinator() {
  return localStorage.getItem(COORD_KEY) || '小麦';
}
function replaceCoord(str) {
  return str.replace(/\{manager\}/g, getCoordinator());
}

/* ══════════════════════════════════════════════════════════════
   渲染逻辑
   ══════════════════════════════════════════════════════════════ */

// ── 状态 ──
let activeCourse = localStorage.getItem('zhuzhen-course-type') || 'interview';
let activeTab = 'before';

function getCourseData() {
  return WORKFLOW_DATA.courses[activeCourse];
}

// ── 日期 & 存储 ──
function getTodayKey() {
  const d = new Date();
  return `zhuzhen-${activeCourse}-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getState() {
  try {
    return JSON.parse(localStorage.getItem(getTodayKey())) || {};
  } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(getTodayKey(), JSON.stringify(state));
}

function formatDate() {
  const d = new Date();
  const weekdays = ['日','一','二','三','四','五','六'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 · 星期${weekdays[d.getDay()]}`;
}

// ── 进度计算 ──
function calcProgress() {
  const state = getState();
  const course = getCourseData();
  let total = 0, done = 0;
  course.phases.forEach(phase => {
    if (phase.isHandover) return;
    phase.steps.forEach(step => {
      total++;
      if (state[step.id]) done++;
    });
  });
  return { total, done };
}

function updateProgress() {
  const { total, done } = calcProgress();
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total} 步已完成` + (pct === 100 ? ' 🎉' : '');

  const state = getState();
  const course = getCourseData();
  course.phases.forEach(phase => {
    const phaseTotal = phase.steps.length;
    const phaseDone = phase.steps.filter(s => state[s.id]).length;
    const countEl = document.querySelector(`[data-tab="${phase.id}"] .count`);
    if (countEl) countEl.textContent = `${phaseDone}/${phaseTotal}`;
  });
}

// ── 课程切换 ──
function renderCourseSwitcher() {
  const el = document.getElementById('courseSwitcher');
  el.innerHTML = Object.entries(WORKFLOW_DATA.courses).map(([key, c]) =>
    `<button class="course-btn${key === activeCourse ? ' active' : ''}" data-course="${key}" onclick="switchCourse('${key}')">${c.icon} ${c.name}</button>`
  ).join('');
}

function switchCourse(courseId) {
  activeCourse = courseId;
  activeTab = 'before';
  localStorage.setItem('zhuzhen-course-type', courseId);
  renderAll();
}

// ── Tab 渲染 ──
function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  const state = getState();
  const course = getCourseData();
  tabsEl.innerHTML = course.phases.map(phase => {
    const phaseDone = phase.steps.filter(s => state[s.id]).length;
    return `<div class="tab${phase.id === activeTab ? ' active' : ''}" data-tab="${phase.id}" onclick="switchTab('${phase.id}')">
      ${phase.icon} ${phase.name} <span class="count">${phaseDone}/${phase.steps.length}</span>
    </div>`;
  }).join('');
}

function switchTab(tabId) {
  activeTab = tabId;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabId));
  document.querySelectorAll('.phase').forEach(p => p.classList.toggle('active', p.id === 'phase-' + tabId));
}

// ── Steps 渲染 ──
function renderSteps() {
  const container = document.getElementById('content');
  const state = getState();
  const course = getCourseData();

  container.innerHTML = course.phases.map(phase => {
    const stepsHtml = phase.steps.map((step, idx) => {
      const isDone = !!state[step.id];
      const badges = [];
      if (step.timeLabel) badges.push(`<span class="badge badge-time">${step.timeLabel}</span>`);
      if (step.needCoord) badges.push(`<span class="badge badge-coord">需协调</span>`);

      const detailsHtml = step.details.map(d => {
        if (/^<(table|div|ol|ul)/.test(d)) return d;
        if (d.startsWith('<')) return `<p style="margin:4px 0">${d}</p>`;
        if (d.startsWith('·')) return `<p style="margin:2px 0 2px 1.2em;color:#444">${d}</p>`;
        return `<p style="margin:4px 0">· ${d}</p>`;
      }).join('');

      const tipHtml = step.tips ? `<div class="tip">${step.tips}</div>` : '';

      return `<div class="step-card${isDone ? ' done' : ''}" data-step="${step.id}">
        <div class="step-header" onclick="toggleCheck('${step.id}')">
          <div class="step-checkbox">
            <svg viewBox="0 0 16 16"><polyline points="3,8 7,12 13,4"/></svg>
          </div>
          <div class="step-info">
            <div class="step-num">Step ${idx + 1}</div>
            <div class="step-title">${step.title}</div>
            <div class="step-summary">${step.summary}</div>
            ${badges.length ? `<div class="step-badges">${badges.join('')}</div>` : ''}
          </div>
        </div>
        <div class="step-toggle" onclick="event.stopPropagation();toggleDetails('${step.id}')">
          <span class="arrow">▸</span> 详细操作
        </div>
        <div class="step-details" id="details-${step.id}">
          ${detailsHtml}
          ${tipHtml}
        </div>
      </div>`;
    }).join('');

    const noticeHtml = phase.notice ? `<div class="handover-notice">${phase.notice}</div>` : '';
    return `<div class="phase${phase.id === activeTab ? ' active' : ''}" id="phase-${phase.id}">${noticeHtml}${stepsHtml}</div>`;
  }).join('');
  container.innerHTML = replaceCoord(container.innerHTML);
}

// ── 事件处理 ──
function toggleCheck(stepId) {
  const state = getState();
  state[stepId] = !state[stepId];
  saveState(state);

  const card = document.querySelector(`[data-step="${stepId}"]`);
  if (card) card.classList.toggle('done', state[stepId]);

  updateProgress();
}

function toggleDetails(stepId) {
  const details = document.getElementById('details-' + stepId);
  const toggle = details.previousElementSibling;
  const isOpen = details.classList.toggle('open');
  toggle.classList.toggle('open', isOpen);
}

// ── Modal ──
function openModal(type) {
  document.getElementById('modal-' + type).classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(type) {
  document.getElementById('modal-' + type).classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOverlay(event, type) {
  if (event.target === document.getElementById('modal-' + type)) closeModal(type);
}

function renderEmergency() {
  const body = document.getElementById('emergencyBody');
  const course = getCourseData();
  const phaseLabels = { '课前': '📋 课前', '课中': '🎙️ 课中', '课后': '📝 课后' };
  const phases = ['课前', '课中', '课后'];
  let html = '';
  phases.forEach(phase => {
    const items = course.emergencies.filter(e => e.phase === phase);
    if (items.length === 0) return;
    html += `<h3>${phaseLabels[phase]}</h3>`;
    html += items.map(e =>
      `<div class="emergency-item">
        <div class="situation">❓ ${e.situation}</div>
        <div class="solution">${e.solution}</div>
      </div>`
    ).join('');
  });
  body.innerHTML = replaceCoord(html);
}

function renderQuickRef() {
  const body = document.getElementById('quickrefBody');
  const course = getCourseData();

  // File naming
  const fn = course.fileNaming;
  let fileHtml = `<h3>📁 ${fn.title}</h3>
    <p style="margin-bottom:8px;font-size:0.85rem">${fn.description}</p>
    <table class="file-naming-table">
      <tr><th>文件</th><th>命名格式</th><th>示例</th></tr>
      ${fn.items.map(i => `<tr><td>${i.file}</td><td><code>${i.format}</code></td><td style="font-size:0.8rem">${i.example}</td></tr>`).join('')}
    </table>`;

  // Annotation colors (shared)
  let colorHtml = `<h3>🎨 批注颜色速查</h3>
    <table class="file-naming-table">
      <tr><th>颜色</th><th>色值</th><th>透明度</th><th>字号</th><th>用途</th></tr>
      ${WORKFLOW_DATA.annotationColors.map(c =>
        `<tr>
          <td><span class="color-swatch" style="background:${c.hex};opacity:${parseInt(c.opacity)/100}"></span>${c.name}</td>
          <td><code>${c.hex}</code></td>
          <td>${c.opacity}</td>
          <td>${c.fontSize}</td>
          <td style="font-size:0.82rem">${c.usage}</td>
        </tr>`
      ).join('')}
    </table>`;

  // Time nodes
  let timeHtml = `<h3>⏰ 时间节点速查</h3>
    <table class="file-naming-table">
      <tr><th>时间</th><th>动作</th></tr>
      ${course.timeNodes.map(t => `<tr><td style="white-space:nowrap;font-weight:600">${t.time}</td><td style="font-size:0.85rem">${t.action}</td></tr>`).join('')}
    </table>`;

  body.innerHTML = replaceCoord(fileHtml + colorHtml + timeHtml);
}

// ── 重置 ──
function confirmReset() {
  document.getElementById('confirmOverlay').classList.add('open');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
}

function doReset() {
  localStorage.removeItem(getTodayKey());
  closeConfirm();
  renderSteps();
  renderTabs();
  updateProgress();
}

// ── 初始化 ──
function renderAll() {
  document.getElementById('pageTitle').textContent = getCourseData().name + '助教 · 每日引导';
  document.getElementById('coordFooter').textContent = getCoordinator();
  renderCourseSwitcher();
  renderTabs();
  renderSteps();
  renderEmergency();
  renderQuickRef();
  updateProgress();
}

function init() {
  document.getElementById('dateDisplay').textContent = formatDate();
  renderAll();
}

init();
</script>
